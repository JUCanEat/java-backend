services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_LEVEL=info
      # Optional: enable basic auth
      # - DOZZLE_AUTH_PROVIDER=basic
    restart: unless-stopped

  java-backend:
    #image: haniazipser2004/awesome-amazing-project:latest
    build: ../
    ports:
      - "8080:8080"
    pull_policy: always
    depends_on:
      postgres_java_backend:
        condition: service_healthy
      keycloak:
        condition: service_started
      rabbitmq:
        condition: service_started
      elasticSearch:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=compose
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=http://localhost:8081/realms/JuCanEat
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/JuCanEat/protocol/openid-connect/certs
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=admin
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=DEBUG
      - KEYCLOAK_AUTH_SERVER_URL=http://localhost:8081
      - KEYCLOAK_REALM=JuCanEat
      - DEEPL_API_KEY=placeholder
    extra_hosts:
      - "localhost:host-gateway" # makes localhost in container resolve to host IP
    networks:
      - jucaneat-net

  postgres_java_backend:
    image: postgres:17
    environment:
      - POSTGRES_DB=java_backend
      - POSTGRES_USER=java_backend
      - POSTGRES_PASSWORD=java_backend
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U java_backend" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-java-backend-data:/var/lib/postgresql/data
    networks:
      - jucaneat-net

  postgres_kc:
    image: postgres:17
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U keycloak" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-kc-data:/var/lib/postgresql/data
    networks:
      - jucaneat-net

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    ports:
      - "8081:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL_HOST=postgres_kc
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
      - KC_DB_URL_DATABASE=keycloak
    command: start-dev --import-realm
    depends_on:
      postgres_kc:
        condition: service_healthy
    volumes:
      - ./imports:/opt/keycloak/data/import
      - ./providers:/opt/keycloak/providers
    networks:
      - jucaneat-net

  rabbitmq:
    image: 'rabbitmq:latest'
    environment:
      - RABBITMQ_DEFAULT_PASS=admin
      - RABBITMQ_DEFAULT_USER=admin
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - jucaneat-net

  elasticSearch:
    image: elasticsearch:8.11.1
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - jucaneat-net

volumes:
  postgres-java-backend-data:
  postgres-kc-data:
  elasticsearch-data:

networks:
  jucaneat-net:
    driver: bridge